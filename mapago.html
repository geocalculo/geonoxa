<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoNOXA | CARD PRO - Análisis Territorial del POI</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/mapago.css" />
  </head>
  <body>
    <div class="page-shell">
      <header id="header-card" class="card panel"></header>

      <section class="card panel" id="panel-general">
        <h2 class="panel-title">1. Datos generales y mapa</h2>
        <div id="general-layout" class="general-layout"></div>
      </section>

      <section class="card panel" id="panel-zona-saturada">
        <h2 class="panel-title">2. Zona Saturada próxima</h2>
        <div id="zona-saturada-layout" class="subgrid"></div>
      </section>

      <section class="card panel" id="panel-relave">
        <h2 class="panel-title">3. Relave próximo</h2>
        <div id="relave-layout" class="subgrid"></div>
      </section>

      <section class="card panel" id="panel-zona-urbana">
        <h2 class="panel-title">4. Zona urbana / PRC próxima</h2>
        <div id="zona-urbana-layout" class="subgrid"></div>
      </section>

      <section class="card panel" id="panel-relaciones">
        <h2 class="panel-title">5. Relaciones espaciales</h2>
        <div id="relations-layout"></div>
      </section>

      <footer class="card panel actions" id="actions"></footer>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
    <script src="js/mapago.js"></script>
  </body>
</html>
